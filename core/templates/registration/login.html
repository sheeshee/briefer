<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briefer — Log in</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 2rem;
            color: #aaa;
            letter-spacing: 0.05em;
        }
        form {
            width: 100%;
            max-width: 320px;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        label {
            display: block;
            font-size: 0.8rem;
            color: #888;
            margin-bottom: 0.3rem;
        }
        input[type="text"], input[type="password"] {
            width: 100%;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 6px;
            color: #eee;
            font-size: 0.9rem;
            padding: 0.5em 0.75em;
        }
        input:focus { outline: none; border-color: #53a8b6; }
        .error { font-size: 0.8rem; color: #e94560; }
        button[type="submit"] {
            background: none;
            border: 1px solid #53a8b6;
            border-radius: 6px;
            color: #53a8b6;
            cursor: pointer;
            font-size: 0.85rem;
            padding: 0.5em 1.2em;
            align-self: flex-start;
            letter-spacing: 0.03em;
        }
        button[type="submit"]:hover { background: rgba(83,168,182,0.1); }
    </style>
</head>
<body>
    <h1>BRIEFER</h1>
    <form method="post">
        {% csrf_token %}
        {% for field in form %}
            <div>
                <label for="{{ field.id_for_label }}">{{ field.label }}</label>
                {{ field }}
                {% for error in field.errors %}
                    <div class="error">{{ error }}</div>
                {% endfor %}
            </div>
        {% endfor %}
        {% if form.non_field_errors %}
            <div class="error">{{ form.non_field_errors }}</div>
        {% endif %}
        <button type="submit">Log in</button>
    </form>
</body>
</html>
