<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Briefer</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #1a1a2e;
            color: #eee;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 2rem 1rem;
        }

        h1 {
            font-size: 1.4rem;
            font-weight: 600;
            margin-bottom: 1.5rem;
            color: #aaa;
            letter-spacing: 0.05em;
        }

        .stack-container {
            position: relative;
            width: 100%;
            max-width: 400px;
            height: 260px;
        }

        .card {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            background: #16213e;
            border: 1px solid #0f3460;
            border-radius: 12px;
            padding: 1.5rem;
            touch-action: none;
            user-select: none;
            cursor: grab;
            transition: transform 0.1s ease, opacity 0.1s ease;
            will-change: transform;
        }

        .card:active { cursor: grabbing; }

        .card .source-badge {
            display: inline-block;
            font-size: 0.7rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: #e94560;
            background: rgba(233, 69, 96, 0.15);
            padding: 0.2em 0.6em;
            border-radius: 4px;
            margin-bottom: 0.75rem;
        }

        .card .card-title {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 0.75rem;
        }

        .card .card-url {
            font-size: 0.8rem;
            color: #53a8b6;
            text-decoration: none;
            word-break: break-all;
        }

        .card .card-url:hover { text-decoration: underline; }

        .card .swipe-hint {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #555;
            text-align: center;
        }

        /* Stacked cards behind */
        .card:nth-child(1) { z-index: 3; }
        .card:nth-child(2) { z-index: 2; transform: scale(0.96) translateY(8px); opacity: 0.7; }
        .card:nth-child(3) { z-index: 1; transform: scale(0.92) translateY(16px); opacity: 0.4; }
        .card:nth-child(n+4) { display: none; }

        .counters {
            display: flex;
            gap: 1.5rem;
            align-items: center;
            margin-bottom: 1.5rem;
            font-size: 0.85rem;
            color: #888;
            width: 100%;
            max-width: 400px;
        }

        .counters .spacer { flex: 1; }

        .fetch-btn {
            background: none;
            border: 1px solid #2a2a4a;
            border-radius: 6px;
            color: #555;
            cursor: pointer;
            font-size: 0.75rem;
            padding: 0.3em 0.7em;
            letter-spacing: 0.03em;
        }

        .fetch-btn:hover { border-color: #53a8b6; color: #53a8b6; }

        .counter span {
            font-weight: 600;
            color: #eee;
        }

        .empty-state {
            text-align: center;
            color: #666;
            margin-top: 4rem;
            font-size: 1.2rem;
        }

        .swipe-indicator {
            position: fixed;
            top: 50%;
            font-size: 1.4rem;
            font-weight: 700;
            padding: 0.5rem 1rem;
            border-radius: 8px;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.15s;
        }

        .swipe-indicator.left {
            left: 1rem;
            color: #e94560;
            background: rgba(233, 69, 96, 0.15);
        }

        .swipe-indicator.right {
            right: 1rem;
            color: #53a8b6;
            background: rgba(83, 168, 182, 0.15);
        }
    </style>
</head>
<body>
    <h1>BRIEFER</h1>
    {% block counters %}{% endblock %}
    {% block content %}{% endblock %}

    <div class="swipe-indicator left" id="indicator-left">SEEN</div>
    <div class="swipe-indicator right" id="indicator-right">ACTION</div>

    {% block scripts %}{% endblock %}
</body>
</html>
